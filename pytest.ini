[pytest]
# Component (deterministic) evals live under evals/component and run with NO API
# keys. Retrieval / LLM-judge / scale evals live in sibling dirs and are opt-in
# (they hit OpenAI + Supabase) — select them with markers, e.g.:
#   pytest -m "not online"          # default-safe, what CI runs on every PR
#   pytest evals/component          # the same deterministic suite explicitly
testpaths = evals/component
python_files = test_*.py
python_functions = test_*
markers =
    online: eval needs live OpenAI/Supabase access (not run on PR tier)
addopts = -ra
